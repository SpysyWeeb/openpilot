# Page: cruise
# Edit this file. Run compile_settings_ui.py to emit settings_ui.json.
id: cruise
label: Cruise
icon: cruise_control
order: 2
remote_configurable: true
description: Longitudinal control, speed limits, and cruise behavior
sections:
- id: core_cruise_features
  title: ''
  description: ''
  items:
  - key: ExperimentalMode
    widget: toggle
    title: Experimental Mode
    enablement:
    - $ref: '#/macros/longitudinal'
  - key: DynamicExperimentalControl
    widget: toggle
    title: Dynamic Experimental Control
    description: Let the model decide when to use sunnypilot ACC or sunnypilot End to End Longitudinal.
    visibility:
    - $ref: '#/macros/longitudinal'
    enablement:
    - $ref: '#/macros/longitudinal'
  - key: DisengageOnAccelerator
    widget: toggle
    title: Disengage Cruise on Accelerator Pedal
    description: When enabled, pressing the accelerator pedal will disengage longitudinal control.
  - key: LongitudinalPersonality
    widget: multiple_button
    title: Driving Personality
    description: Standard is recommended. In aggressive mode, sunnypilot will follow lead cars closer and be more aggressive
      with the gas and brake. In relaxed mode sunnypilot will stay further away from lead cars. On supported cars, you can
      cycle through these personalities with your steering wheel distance button.
    options:
    - value: 0
      label: Aggressive
    - value: 1
      label: Standard
    - value: 2
      label: Relaxed
    enablement:
    - $ref: '#/macros/longitudinal'
  - key: IntelligentCruiseButtonManagement
    widget: toggle
    title: Intelligent Cruise Button Management (ICBM) (Alpha)
    visibility:
    - type: capability
      field: icbm_available
      equals: true
    enablement:
    - $ref: '#/macros/offroad'
    - type: not
      condition:
        type: capability
        field: has_longitudinal_control
        equals: true
- id: smooth_stops
  title: Smooth Stops
  description: ''
  enablement:
  - $ref: '#/macros/longitudinal'
  items:
  - key: SmoothStops
    widget: toggle
    title: Smooth Stops
    description: Finish every stop with a smooth landing, no matter how firmly it began. Higher smoothness lands more gently
      and adds a little stopping distance. Full braking remains available when a lead vehicle is close.

    visibility:
    - $ref: '#/macros/longitudinal'
    enablement:
    - $ref: '#/macros/longitudinal'
  sub_panels:
  - id: smooth_stops_settings
    label: Smooth Stops Settings
    trigger_key: SmoothStops
    trigger_condition:
      type: param
      key: SmoothStops
      equals: true
    items:
    - key: SmoothStopsLevel
      widget: option
      title: Stop Smoothness
      description: '1: Soft, 2: Softer, 3: Softest'
      min: 1
      max: 3
      step: 1
      enablement:
      - type: param
        key: SmoothStops
        equals: true
- id: increased_stop_distance
  title: ''
  description: ''
  items:
  - key: IncreasedStoppedDistance
    widget: option
    title: Increased Stopped Distance
    description: Increase the distance sunnypilot stops behind a stopped lead vehicle or at a red light, in meters.
    min: 0
    max: 5
    step: 1
- id: custom_personality
  title: Custom Personality
  description: ''
  enablement:
  - $ref: '#/macros/longitudinal'
  items:
  - key: CustomPersonality
    widget: toggle
    title: Enable Custom Personality
    description: Give each Driving Personality your own acceleration, responsiveness, and follow distance.
    visibility:
    - $ref: '#/macros/longitudinal'
    enablement:
    - $ref: '#/macros/longitudinal'
  sub_panels:
  - id: custom_personality_settings
    label: Custom Personality Settings
    trigger_key: CustomPersonality
    trigger_condition:
      type: param
      key: CustomPersonality
      equals: true
    items:
    - key: CustomPersonalityAggressiveAccel
      widget: option
      title: 'Aggressive: Acceleration'
      description: Maximum acceleration from a stop, in 0.1 m/s^2 steps. Stock is 16 (1.6 m/s^2).
      min: 8
      max: 20
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityAggressiveJerkMultiplier
      widget: option
      title: 'Aggressive: Jerk Value'
      description: How much jerk sunnypilot may use, relative to stock, in 0.1x steps. 10 (1.0x) matches stock Standard and Relaxed; 20 (2.0x) matches stock Aggressive.
      min: 5
      max: 40
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityAggressiveFollow
      widget: option
      title: 'Aggressive: Follow Distance'
      description: Time gap to the lead vehicle, in 0.05 s steps. Stock - Aggressive 25 (1.25 s), Standard 29 (1.45 s), Relaxed 35 (1.75 s).
      min: 20
      max: 50
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityStandardAccel
      widget: option
      title: 'Standard: Acceleration'
      description: Maximum acceleration from a stop, in 0.1 m/s^2 steps. Stock is 16 (1.6 m/s^2).
      min: 8
      max: 20
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityStandardJerkMultiplier
      widget: option
      title: 'Standard: Jerk Value'
      description: How much jerk sunnypilot may use, relative to stock, in 0.1x steps. 10 (1.0x) matches stock Standard and Relaxed; 20 (2.0x) matches stock Aggressive.
      min: 5
      max: 40
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityStandardFollow
      widget: option
      title: 'Standard: Follow Distance'
      description: Time gap to the lead vehicle, in 0.05 s steps. Stock - Aggressive 25 (1.25 s), Standard 29 (1.45 s), Relaxed 35 (1.75 s).
      min: 20
      max: 50
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityRelaxedAccel
      widget: option
      title: 'Relaxed: Acceleration'
      description: Maximum acceleration from a stop, in 0.1 m/s^2 steps. Stock is 16 (1.6 m/s^2).
      min: 8
      max: 20
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityRelaxedJerkMultiplier
      widget: option
      title: 'Relaxed: Jerk Value'
      description: How much jerk sunnypilot may use, relative to stock, in 0.1x steps. 10 (1.0x) matches stock Standard and Relaxed; 20 (2.0x) matches stock Aggressive.
      min: 5
      max: 40
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
    - key: CustomPersonalityRelaxedFollow
      widget: option
      title: 'Relaxed: Follow Distance'
      description: Time gap to the lead vehicle, in 0.05 s steps. Stock - Aggressive 25 (1.25 s), Standard 29 (1.45 s), Relaxed 35 (1.75 s).
      min: 20
      max: 50
      step: 1
      enablement:
      - type: param
        key: CustomPersonality
        equals: true
- id: custom_acc_increments
  title: Custom ACC Speed Intervals
  description: ''
  enablement:
  - $ref: '#/macros/offroad'
  - type: any
    conditions:
    - type: all
      conditions:
      - type: capability
        field: has_longitudinal_control
        equals: true
      - type: not
        condition:
          type: capability
          field: pcm_cruise
          equals: true
    - type: capability
      field: has_icbm
      equals: true
  items:
  - key: CustomAccIncrementsEnabled
    widget: toggle
    title: Enable Custom ACC Speed Intervals
    enablement:
    - $ref: '#/macros/offroad'
    - type: any
      conditions:
      - type: all
        conditions:
        - type: capability
          field: has_longitudinal_control
          equals: true
        - type: not
          condition:
            type: capability
            field: pcm_cruise
            equals: true
      - type: capability
        field: has_icbm
        equals: true
  sub_panels:
  - id: custom_acc_intervals
    label: Custom ACC Speed Intervals Settings
    trigger_key: CustomAccIncrementsEnabled
    trigger_condition:
      type: param
      key: CustomAccIncrementsEnabled
      equals: true
    items:
    - key: CustomAccShortPressIncrement
      widget: option
      title: Short Press Increment
      min: 1
      max: 10
      step: 1
      enablement:
      - type: param
        key: CustomAccIncrementsEnabled
        equals: true
    - key: CustomAccLongPressIncrement
      widget: option
      title: Long Press Increment
      min: 1
      max: 10
      step: 1
      enablement:
      - type: param
        key: CustomAccIncrementsEnabled
        equals: true
- id: speed_limits
  title: Speed Limits
  description: Speed limit detection and offset behavior
  items: []
  sub_panels:
  - id: speed_limit_settings
    label: Speed Limit Settings
    trigger_key: SpeedLimitMode
    items:
    - key: SpeedLimitMode
      widget: multiple_button
      title: Speed Limit Assist Mode
      options:
      - value: 0
        label: 'Off'
      - value: 1
        label: Information
      - value: 2
        label: Warning
      - value: 3
        label: Assist
        enablement:
        - type: any
          conditions:
          - type: capability
            field: has_longitudinal_control
            equals: true
          - type: capability
            field: has_icbm
            equals: true
        - type: not
          condition:
            type: capability
            field: brand
            equals: rivian
        - type: not
          condition:
            type: all
            conditions:
            - type: capability
              field: brand
              equals: tesla
            - type: capability
              field: is_sp_release
              equals: true
    - key: SpeedLimitPolicy
      widget: multiple_button
      title: Speed Limit Source
      options:
      - value: 0
        label: Car State Only
      - value: 1
        label: Map Data Only
      - value: 2
        label: Car State Priority
      - value: 3
        label: Map Data Priority
      - value: 4
        label: Combined
    - key: SpeedLimitOffsetType
      widget: multiple_button
      title: Speed Limit Offset Type
      options:
      - value: 0
        label: 'Off'
      - value: 1
        label: Fixed
      - value: 2
        label: Percentage
    - key: SpeedLimitValueOffset
      widget: option
      title: Speed Limit Offset Value
      min: -30
      max: 30
      step: 1
      unit:
        metric: km/h
        imperial: mph
      visibility:
      - type: param_compare
        key: SpeedLimitOffsetType
        op: '>'
        value: 0
- id: smart_cruise
  title: Smart Cruise Control
  description: ''
  enablement:
  - type: any
    conditions:
    - type: capability
      field: has_longitudinal_control
      equals: true
    - type: capability
      field: has_icbm
      equals: true
  items:
  - key: SmartCruiseControlVision
    widget: toggle
    title: Vision
    description: Use vision path predictions to estimate the appropriate speed to drive through turns ahead.
    visibility:
    - type: any
      conditions:
      - type: capability
        field: has_longitudinal_control
        equals: true
      - type: capability
        field: has_icbm
        equals: true
    enablement:
    - type: any
      conditions:
      - type: capability
        field: has_longitudinal_control
        equals: true
      - type: capability
        field: has_icbm
        equals: true
  - key: SmartCruiseControlMap
    widget: toggle
    title: Map
    description: Use map data to estimate the appropriate speed to drive through turns ahead.
    visibility:
    - type: any
      conditions:
      - type: capability
        field: has_longitudinal_control
        equals: true
      - type: capability
        field: has_icbm
        equals: true
    enablement:
    - type: any
      conditions:
      - type: capability
        field: has_longitudinal_control
        equals: true
      - type: capability
        field: has_icbm
        equals: true
